<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="images/favicon-logo.png">
<title>心理健康评估量表</title>
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
  background: #f5f3ee;
  color: #2c2c2c;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.8s, color 0.8s, filter 0.3s;
  overflow-x: hidden;
  cursor: default;
}
body.cursed-cursor, body.cursed-cursor * { cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16'><circle cx='8' cy='8' r='6' fill='%23cc0000' opacity='0.8'/></svg>") 8 8, auto !important; }
body.afterimage { filter: invert(0.85) hue-rotate(180deg); transition: filter 0.05s; }

/* ========== CURSOR TRAIL ========== */
.cursor-trail {
  position: fixed; pointer-events: none; z-index: 99999;
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(180,0,0,0.6);
  animation: trailFade 0.6s ease-out forwards;
}
@keyframes trailFade { 0% { opacity:0.8; transform:scale(1); } 100% { opacity:0; transform:scale(0); } }

/* ========== FALSE SAFETY OVERLAY ========== */
.safety-overlay {
  position: fixed; inset: 0; z-index: 10004; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
}
.safety-msg {
  font-size: 14px; color: #4a8; letter-spacing: 2px;
  font-family: "Microsoft YaHei", sans-serif;
  padding: 8px 24px; background: rgba(0,0,0,0.6); border-radius: 4px;
}
.safety-msg.crack {
  animation: safetyCrack 0.6s ease forwards;
  color: #c00;
}
@keyframes safetyCrack {
  0%   { color:#4a8; transform:scale(1); }
  30%  { color:#c00; transform:scale(1.05); }
  50%  { color:#4a8; }
  70%  { color:#c00; letter-spacing:8px; }
  100% { color:#c00; letter-spacing:2px; opacity:0; }
}

/* ========== TITLE CRAWLER ========== */
.title-crawler {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 9997;
  pointer-events: none; padding: 4px 0;
  background: rgba(0,0,0,0.03);
  overflow: hidden; height: 18px;
  opacity: 0; transition: opacity 3s;
}
.title-crawler.active { opacity: 1; }
.title-crawler span {
  display: inline-block; white-space: nowrap;
  font-size: 11px; color: rgba(0,0,0,0.08);
  animation: crawlLeft 60s linear infinite;
}
@keyframes crawlLeft { 0% { transform:translateX(100vw); } 100% { transform:translateX(-200%); } }

/* ========== VIGNETTE OVERLAY ========== */
.vignette {
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: transparent;
  transition: background 1.5s;
}
.vignette.active {
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
}

/* ========== SCANLINES ========== */
.scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 9998;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  opacity: 0; transition: opacity 2s;
}
.scanlines.active { opacity: 1; }

/* ========== MAIN CONTAINER ========== */
.container {
  width: 100%; max-width: 680px; padding: 48px 40px; position: relative; z-index: 10;
}
.header { text-align: center; margin-bottom: 40px; }
.header .logo {
  font-size: 13px; letter-spacing: 3px; color: #7a9db8; text-transform: uppercase;
}
.header h1 {
  font-size: 26px; font-weight: 400; margin-top: 8px; color: #1a3a4a;
  letter-spacing: 1px;
}
.header .subtitle { font-size: 13px; color: #999; margin-top: 4px; }

/* ========== PROGRESS BAR ========== */
.progress-wrap { margin-bottom: 36px; }
.progress-info { display: flex; justify-content: space-between; font-size: 12px; color: #999; margin-bottom: 6px; }
.progress-bar {
  width: 100%; height: 3px; background: #e0dcd5; border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: #7a9db8; border-radius: 2px;
  transition: width 0.5s ease;
}

/* ========== QUESTION AREA ========== */
.question-area { margin-bottom: 32px; min-height: 60px; }
.question-number { font-size: 12px; color: #bbb; letter-spacing: 2px; margin-bottom: 12px; }
.question-text {
  font-size: 18px; line-height: 1.7; color: #2c2c2c;
  transition: color 0.3s, transform 0.1s;
}
.question-text.shake { animation: textShake 0.15s ease 3; }
.question-text.red { color: #8b0000; }

/* ========== OPTIONS ========== */
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  padding: 16px 20px; background: #fff; border: 1px solid #e0dcd5; border-radius: 6px;
  cursor: pointer; font-size: 15px; color: #444; transition: all 0.2s;
  position: relative; outline: none;
}
.option:hover { border-color: #7a9db8; background: #f8fafb; }
.option:active { transform: scale(0.985); }
.option.selected { border-color: #7a9db8; background: #eef4f8; }
.option.red-flash {
  animation: optionRedFlash 0.8s ease;
}
.option.all-red {
  border-color: #8b0000 !important; color: #8b0000 !important; background: #fff5f5 !important;
}
.option.auto-select {
  border-color: #8b0000; background: #fff0f0; color: #8b0000;
  transition: all 0.15s;
}

/* ========== BUTTONS ========== */
.btn {
  display: inline-block; padding: 12px 32px; background: #7a9db8; color: #fff;
  border: none; border-radius: 4px; font-size: 15px; cursor: pointer;
  letter-spacing: 1px; transition: all 0.2s;
}
.btn:hover { background: #5f829e; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-wrap { text-align: center; margin-top: 28px; }

/* ========== DARK OVERLAY ========== */
.dark-overlay {
  position: fixed; inset: 0; z-index: 10000; background: #000;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.dark-overlay.flash { opacity: 1; transition: opacity 0.05s; }

/* ========== GHOST IMAGE OVERLAY ========== */
#ghostImg {
  position: fixed; inset: 0; z-index: 10001; pointer-events: none; opacity: 0;
  width: 100%; height: 100%; object-fit: cover;
}

/* ========== GLITCH TEXT OVERLAY ========== */
.glitch-overlay {
  position: fixed; inset: 0; z-index: 10002; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
}
.glitch-overlay.show { opacity: 1; }
.glitch-text {
  font-size: 48px; color: #cc0000; font-weight: bold;
  letter-spacing: 6px; text-shadow: 2px 2px 0 #000, -2px -2px 0 #300;
  animation: glitchText 0.3s ease;
}

/* ========== BARRAGE OVERLAY ========== */
.barrage-overlay {
  position: fixed; inset: 0; z-index: 10003; pointer-events: none;
  overflow: hidden; display: none;
  background: rgba(80,0,0,0.08);
}
.barrage-overlay.active { display: block; }
.barrage-msg {
  position: absolute; white-space: nowrap; font-weight: bold;
  font-family: "SimHei", "Microsoft YaHei", sans-serif;
  text-shadow: 0 0 8px rgba(200,0,0,0.8);
  animation: barrageFly var(--dur) linear forwards;
  opacity: 0.9; pointer-events: none;
}
.barrage-msg.reverse {
  animation: barrageFlyReverse var(--dur) linear forwards;
}
.barrage-msg.vertical {
  writing-mode: vertical-rl;
  animation: barrageFall var(--dur) linear forwards;
}
.barrage-msg.diagonal {
  animation: barrageDiagonal var(--dur) linear forwards;
}
.barrage-msg.hiscoming {
  font-size: 52px; color: #cc0000; z-index: 10;
  text-shadow: 0 0 20px #ff0000, 0 0 40px #8b0000, 0 0 60px #600;
  animation: barrageBig var(--dur) linear forwards;
}
@keyframes barrageFly {
  0%   { transform: translateX(0) rotate(0deg); }
  100% { transform: translateX(-120vw) rotate(var(--rot,0deg)); }
}
@keyframes barrageFlyReverse {
  0%   { transform: translateX(0) rotate(0deg); }
  100% { transform: translateX(120vw) rotate(var(--rot,0deg)); }
}
@keyframes barrageFall {
  0%   { transform: translateY(-20vh); }
  100% { transform: translateY(110vh); }
}
@keyframes barrageDiagonal {
  0%   { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(-100vw, 80vh) rotate(var(--rot,0deg)); }
}
@keyframes barrageBig {
  0%   { opacity: 0; transform: translateX(0) scale(0.1); }
  10%  { opacity: 1; transform: translateX(-10vw) scale(1.4); }
  30%  { opacity: 1; transform: translateX(-35vw) scale(1); }
  100% { opacity: 0; transform: translateX(-110vw) scale(0.6); }
}

/* ========== ENDING PAGE ========== */
.ending-page {
  display: none; position: fixed; inset: 0; z-index: 100; background: #0a0a0a;
  flex-direction: column; align-items: center; justify-content: flex-start;
  text-align: center; color: #ccc; overflow-y: auto; padding: 30px 20px 60px;
}
.ending-page.show { display: flex; }
.ending-page .result-title { font-size: 22px; color: #999; letter-spacing: 3px; margin-bottom: 8px; }
.ending-page .result-score { font-size: 48px; color: #7a9db8; font-weight: 300; margin-bottom: 24px; }
.ending-page .result-desc { font-size: 15px; color: #888; max-width: 400px; line-height: 1.8; margin-bottom: 48px; }
.ending-page .creepy-footer { font-size: 14px; color: #555; letter-spacing: 2px; margin-top: 32px; }
.ending-page .creepy-footer span { color: #8b0000; animation: pulseRed 2s ease-in-out infinite; }
@keyframes pulseRed {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
.creepy-image { margin-top: 16px; max-width: 260px; max-height: 260px; opacity: 0; transition: opacity 4s; border-radius: 4px; filter: grayscale(0.3) brightness(0.85); }
.creepy-image.zooming { animation: dollZoom 14s ease-in-out forwards; }
@keyframes dollZoom {
  0% { transform: scale(1); }
  100% { transform: scale(1.4); }
}

/* Ending crawl */
.ending-crawl {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 102;
  padding: 12px 0; overflow: hidden;
  font-size: 14px; color: #600; letter-spacing: 3px;
  white-space: nowrap;
  opacity: 0; transition: opacity 3s;
}
.ending-crawl.active { opacity: 1; }
.ending-crawl span {
  display: inline-block;
  animation: crawlLeft 18s linear infinite;
}
@keyframes crawlLeft {
  0% { transform: translateX(100vw); }
  100% { transform: translateX(-100%); }
}

/* Ending whisper text */
.ending-whisper {
  position: fixed; top: 15%; left: 0; right: 0; z-index: 101;
  text-align: center; font-size: 13px; color: #400;
  letter-spacing: 4px; opacity: 0;
  animation: whisperFade 16s ease-in-out infinite;
}
@keyframes whisperFade {
  0%, 100% { opacity: 0; }
  50% { opacity: 0.5; }
}

/* ========== ANIMATIONS ========== */
@keyframes textShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
}
@keyframes optionRedFlash {
  0% { border-color: #e0dcd5; color: #444; }
  30% { border-color: #8b0000; color: #8b0000; background: #fff0f0; }
  100% { border-color: #e0dcd5; color: #444; background: #fff; }
}
@keyframes glitchText {
  0% { transform: translate(0); opacity: 1; }
  20% { transform: translate(-10px, 3px); opacity: 0.8; }
  40% { transform: translate(8px, -2px); opacity: 1; }
  60% { transform: translate(-5px, -5px); opacity: 0.6; }
  80% { transform: translate(3px, 4px); opacity: 0.9; }
  100% { transform: translate(0); opacity: 0; }
}
@keyframes screenShake {
  0%, 100% { transform: translate(0); }
  10% { transform: translate(-5px, 3px); }
  20% { transform: translate(5px, -2px); }
  30% { transform: translate(-3px, -4px); }
  40% { transform: translate(4px, 2px); }
  50% { transform: translate(-2px, 5px); }
  60% { transform: translate(6px, -3px); }
  70% { transform: translate(-4px, -1px); }
  80% { transform: translate(3px, 4px); }
  90% { transform: translate(-6px, -5px); }
}
body.screen-shake { animation: screenShake 0.5s ease-out; }

/* ========== TRANSITION FADE ========== */
.fade-out { opacity: 0; transition: opacity 0.3s; }
.fade-in { opacity: 1; transition: opacity 0.3s; }

/* ========== IMPOSTOR DETECTION OVERLAY ========== */
.impostor-overlay {
  position: fixed; inset: 0; z-index: 10005; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s;
  background: rgba(0,0,0,0.85);
}
.impostor-overlay.active { opacity: 1; }
.impostor-label {
  font-size: 16px; color: #4a8; letter-spacing: 4px;
  font-family: "Courier New", monospace;
  margin-bottom: 12px;
}
.impostor-bar-wrap {
  width: 280px; height: 6px; background: #1a1a1a;
  border: 1px solid #333; border-radius: 3px;
  overflow: hidden;
}
.impostor-bar {
  width: 0%; height: 100%; background: #4a8;
  transition: width 0.15s linear;
}
.impostor-bar.glitch-bar {
  background: #c00; transition: width 0.05s linear;
}
.impostor-fail {
  margin-top: 16px; font-size: 22px; color: #c00;
  letter-spacing: 6px; font-family: "Courier New", monospace;
  opacity: 0; transition: opacity 0.3s;
}
.impostor-fail.show { opacity: 1; animation: failPulse 0.4s ease 3; }
@keyframes failPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}

/* Subtitle glitch */
.subtitle-impostor { color: #c00 !important; letter-spacing: 1px; transition: color 0.1s, letter-spacing 0.1s; }
</style>
</head>
<body>

<div class="vignette" id="vignette"></div>
<div class="scanlines" id="scanlines"></div>
<div class="dark-overlay" id="darkOverlay"></div>
<audio id="bgmNormalAudio" src="audio/bgm-normal.mp3" loop preload="auto"></audio>
<audio id="heartbeatNormal" src="audio/heartbeat-normal.mp3" loop preload="auto"></audio>
<audio id="heartbeatFast" src="audio/heartbeat-fast.mp3" loop preload="auto"></audio>
<audio id="heartbeatVeryFast" src="audio/heartbeat-veryfast.mp3" loop preload="auto"></audio>
<audio id="knockingAudio" src="audio/knocking.mp3" preload="auto"></audio>
<audio id="ghostAmbient" src="audio/ghost-ambient.mp3" preload="auto"></audio>
<audio id="laughChild" src="audio/laugh-child.mp3" preload="auto"></audio>
<audio id="voiceWitch" src="audio/voice-witch.mp3" preload="auto"></audio>
<audio id="cryWoman" src="audio/cry-woman.mp3" preload="auto"></audio>
<img id="ghostImg" src="images/ghost-face.jpg" alt="">
<div class="glitch-overlay" id="glitchOverlay"><div class="glitch-text" id="glitchText"></div></div>
<div class="barrage-overlay" id="barrageOverlay"></div>
<div class="safety-overlay" id="safetyOverlay"><div class="safety-msg" id="safetyMsg">系统正常</div></div>
<div class="title-crawler" id="titleCrawler"><span id="crawlerText"></span></div>
<div class="impostor-overlay" id="impostorOverlay">
  <div class="impostor-label" id="impostorLabel">身份验证中</div>
  <div class="impostor-bar-wrap"><div class="impostor-bar" id="impostorBar"></div></div>
  <div class="impostor-fail" id="impostorFail">验证失败</div>
</div>

<div class="container" id="mainContainer">
  <div class="header">
    <div class="logo">心理评估中心 · PSYCHOLOGICAL ASSESSMENT</div>
    <h1>心理健康评估量表</h1>
    <div class="subtitle">SCL-90 简化版 · 第 3.7 版 · 完全匿名</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-info"><span id="progressLabel">进度</span><span id="progressPercent">0 / 50</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="question-area">
    <div class="question-number" id="questionNumber">第 1 题</div>
    <div class="question-text" id="questionText"></div>
  </div>
  <div class="options" id="optionsWrap"></div>
  <div class="btn-wrap"><button class="btn" id="nextBtn" disabled>下一题</button></div>
</div>

<div class="ending-page" id="endingPage">
  <div class="result-title">心 理 评 估 报 告</div>
  <div class="result-score" id="resultScore">--</div>
  <div class="result-desc" id="resultDesc"></div>
  <img class="creepy-image" id="creepyImage" src="images/creepy-doctor.png" alt="">
  <div class="ending-whisper" id="endingWhisper">你确定你是人类吗</div>
  <div class="ending-crawl" id="endingCrawl"><span>我们还会找到你&nbsp;&nbsp;&nbsp;&nbsp;我们一直在这里&nbsp;&nbsp;&nbsp;&nbsp;你不是你&nbsp;&nbsp;&nbsp;&nbsp;别以为测试结束了&nbsp;&nbsp;&nbsp;&nbsp;他们就在我们中间&nbsp;&nbsp;&nbsp;&nbsp;我们还会找到你&nbsp;&nbsp;&nbsp;&nbsp;</span></div>
  <div class="creepy-footer">感谢您完成测试。<br>我们<span>还会找到您</span>。</div>
  <button class="btn restart-btn" id="restartBtn" style="margin-top:40px;background:transparent;border:1px solid #444;color:#666;letter-spacing:2px;font-size:13px;cursor:pointer;padding:10px 28px;border-radius:4px;transition:all 0.3s;" onmouseover="this.style.borderColor='#7a9db8';this.style.color='#7a9db8';" onmouseout="this.style.borderColor='#444';this.style.color='#666';">重新测试</button>
</div>

<script>
// ==================== AUDIO ENGINE ====================
let audioCtx = null;
let horrorBGM = null, bgmGain = null;

const bgmAudio     = document.getElementById('bgmNormalAudio');
const hbNormal     = document.getElementById('heartbeatNormal');
const hbFast       = document.getElementById('heartbeatFast');
const hbVeryFast   = document.getElementById('heartbeatVeryFast');
const knockingSfx  = document.getElementById('knockingAudio');
	const laughChild   = document.getElementById('laughChild');
	const voiceWitch   = document.getElementById('voiceWitch');
	const cryWoman     = document.getElementById('cryWoman');

bgmAudio.volume = 0.35;
hbNormal.volume = 0;
hbFast.volume = 0;
hbVeryFast.volume = 0;
knockingSfx.volume = 0.5;
laughChild.volume = 0.6;
voiceWitch.volume = 0.5;
cryWoman.volume = 0.5;

let heartbeatPhase = 0; // 0=off, 1=normal, 2=fast, 3=veryfast
let heartbeatTimer = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Resume if suspended (required by modern browsers)
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(e => console.warn('AudioContext resume failed:', e));
  }
  bgmGain = audioCtx.createGain();
  bgmGain.gain.value = 0.08;
  bgmGain.connect(audioCtx.destination);
}

// ---- Heartbeat sequence: normal → fast → very fast ----
function startHeartbeatSequence() {
  if (heartbeatPhase > 0) return;
  heartbeatPhase = 1;

  // Fade in normal heartbeat
  hbNormal.currentTime = 0;
  hbNormal.play().catch(e => console.warn('Audio play failed:', e.message));
  smoothVolume(hbNormal, 0, 0.35, 2000);

  // → fast after 5s
  heartbeatTimer = setTimeout(() => {
    heartbeatPhase = 2;
    crossfadeHeartbeats(hbNormal, hbFast, 0.35);
  }, 5000);

  // → very fast after 10s
  heartbeatTimer = setTimeout(() => {
    heartbeatPhase = 3;
    crossfadeHeartbeats(hbFast, hbVeryFast, 0.4);
  }, 10000);
}

function stopHeartbeatSequence() {
  heartbeatPhase = 0;
  clearTimeout(heartbeatTimer);

  [hbNormal, hbFast, hbVeryFast].forEach(hb => {
    smoothVolume(hb, hb.volume, 0, 800);
    setTimeout(() => { hb.pause(); hb.currentTime = 0; }, 900);
  });
}

function crossfadeHeartbeats(fromEl, toEl, targetVol) {
  toEl.currentTime = 0;
  toEl.play().catch(e => console.warn('Audio play failed:', e.message));
  smoothVolume(fromEl, fromEl.volume, 0, 1500);
  smoothVolume(toEl, 0, targetVol, 1500);
}

function smoothVolume(el, from, to, durationMs) {
  const steps = 20;
  const interval = durationMs / steps;
  let step = 0;
  const timer = setInterval(() => {
    step++;
    el.volume = from + (to - from) * (step / steps);
    if (step >= steps) clearInterval(timer);
  }, interval);
}

// ---- BGM switching ----
function switchToNormalBGM() {
  if (horrorBGM) horrorBGM.gain.setTargetAtTime(0, audioCtx ? audioCtx.currentTime : 0, 0.8);
  stopHeartbeatSequence();
  smoothVolume(bgmAudio, bgmAudio.volume, 0.35, 2000);
}

function switchToHorrorBGM() {
  // Fade normal music down
  smoothVolume(bgmAudio, bgmAudio.volume, 0.02, 3000);

  // Start heartbeat sequence
  startHeartbeatSequence();

  // Start horror drone (Web Audio)
  if (!audioCtx) return;
  if (!horrorBGM) createHorrorBGM();
  horrorBGM.gain.setTargetAtTime(1, audioCtx.currentTime, 2);
}

// ---- Knocking sound ----
function playKnocking() {
  knockingSfx.currentTime = 0;
  knockingSfx.play().catch(e => console.warn('Audio play failed:', e.message));
}

function createHorrorBGM() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const gain = audioCtx.createGain();
  gain.gain.value = 0;
  gain.connect(bgmGain);

  // Low drone with dissonant intervals
  [41.2, 58.27, 77.78].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 0.1 + i * 0.15;
    lfo.type = 'sawtooth';
    lfoGain.gain.value = 0.5;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    const oscGain = audioCtx.createGain();
    oscGain.gain.value = 0.08;
    osc.connect(oscGain);
    oscGain.connect(gain);
    lfo.start(now);
    osc.start(now);
  });

const GARBLED = '҉҈҉҈▇▓▒░█▄▌▐▀■□▪▫◘◙○☼▶▼▲◀●◉◎◈◇◆∆∇∑∏√∞∩∫≈≠≡≤≥⌂⌐⌠⌡─═║╒╓╔╕╖╗╘╙╚╛╜╝╞╟╠╡╢╣╤╥╦╧╨╩╪╫╬';
const CREEPY_WORDS = ['他来了','他在看','跑','别回头','快走','救命','来不及了','他就在你身后','你不是你','他们来了','快跑'];
const REDS = ['#cc0000','#dd1111','#ff0000','#bb0000','#ee2222','#c80000','#990000','#ff2222','#aa0000'];

function spawnBarrageItem(overlay, w, h, hiscomingCount) {
  const el = document.createElement('div');
  const isHisComing = (Math.random() < 0.08 && hiscomingCount.count < 12);

  if (isHisComing) {
    hiscomingCount.count++;
    el.className = 'barrage-msg hiscoming';
    el.textContent = '他来了';
    el.style.top = (Math.random() * h * 0.85) + 'px';
    el.style.left = (w + Math.random() * 200) + 'px';
    el.style.setProperty('--dur', (3 + Math.random() * 3) + 's');
  } else {
    const r = Math.random();
    if (r < 0.5) {
      // Garbled characters - longer strings
      el.className = 'barrage-msg';
      const len = 5 + Math.floor(Math.random() * 30);
      let str = '';
      for (let i = 0; i < len; i++) str += GARBLED[Math.floor(Math.random() * GARBLED.length)];
      el.textContent = str;
      el.style.fontSize = (12 + Math.random() * 36) + 'px';
    } else if (r < 0.75) {
      // Single large symbol
      el.className = 'barrage-msg';
      el.textContent = GARBLED[Math.floor(Math.random() * GARBLED.length)];
      el.style.fontSize = (40 + Math.random() * 60) + 'px';
      el.style.opacity = '0.5';
    } else {
      // Creepy word
      el.className = 'barrage-msg';
      el.textContent = CREEPY_WORDS[Math.floor(Math.random() * CREEPY_WORDS.length)];
      el.style.fontSize = (18 + Math.random() * 28) + 'px';
    }
    el.style.color = REDS[Math.floor(Math.random() * REDS.length)];

    // Random direction
    const dir = Math.random();
    if (dir < 0.45) {
      // Left to right (reverse)
      el.classList.add('reverse');
      el.style.top = (Math.random() * h * 0.9) + 'px';
      el.style.left = (-200 - Math.random() * 400) + 'px';
      el.style.setProperty('--dur', (2 + Math.random() * 5) + 's');
    } else if (dir < 0.55) {
      // Vertical fall
      el.classList.add('vertical');
      el.style.left = (Math.random() * w * 0.95) + 'px';
      el.style.top = (-50 - Math.random() * 200) + 'px';
      el.style.setProperty('--dur', (3 + Math.random() * 4) + 's');
    } else if (dir < 0.65) {
      // Diagonal
      el.classList.add('diagonal');
      el.style.top = (-50 - Math.random() * 100) + 'px';
      el.style.left = (w + Math.random() * 300) + 'px';
      el.style.setProperty('--dur', (3 + Math.random() * 5) + 's');
      el.style.setProperty('--rot', (Math.random() * 30 - 15) + 'deg');
    } else {
      // Default right to left
      el.style.top = (Math.random() * h * 0.9) + 'px';
      el.style.left = (w + Math.random() * 500) + 'px';
      el.style.setProperty('--dur', (2 + Math.random() * 6) + 's');
      el.style.setProperty('--rot', (Math.random() * 20 - 10) + 'deg');
    }
  }

  overlay.appendChild(el);
  setTimeout(() => el.remove(), 9000);
}

function triggerBarrage(durationMs = 4000) {
  const overlay = document.getElementById('barrageOverlay');
  overlay.classList.add('active');
  switchToHorrorBGM();

  const h = window.innerHeight;
  const w = window.innerWidth;
  const hiscomingCount = { count: 0 };

  // High speed spawning - fill the screen
  const interval = setInterval(() => {
    // Spawn 2-4 items each tick for density
    const batch = 2 + Math.floor(Math.random() * 3);
    for (let i = 0; i < batch; i++) {
      spawnBarrageItem(overlay, w, h, hiscomingCount);

  }, 25);

  // Stop after duration
  setTimeout(() => {
    clearInterval(interval);
    setTimeout(() => {
      overlay.innerHTML = '';
      overlay.classList.remove('active');
      switchToNormalBGM();
    }, 2000);
  }, durationMs);
}

// ==================== GAME STATE ====================
let currentQuestion = 0;
let selectedOption = -1;
let creepyCount = 0;
let totalCreepySelected = 0;
let scareLocked = false;

// ==================== RENDER QUESTION ====================
function renderQuestion() {
  const q = questions[currentQuestion];
  selectedOption = -1;
  q._creepyTracked = false; // Reset per-question scare tracking
  q._scareFired = false;

  // Update question display
  document.getElementById('questionNumber').textContent = `第 ${q.id} 题`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('questionText').classList.remove('shake', 'red');
  document.getElementById('progressPercent').textContent = `${q.id} / 50`;
  document.getElementById('progressFill').style.width = `${(q.id / 50) * 100}%`;
  document.getElementById('nextBtn').disabled = true;

  // Render options
  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const el = document.createElement('div');
    el.className = 'option';
    el.textContent = `${String.fromCharCode(65 + i)}. ${opt}`;
    el.addEventListener('click', () => selectOption(i, el));
    wrap.appendChild(el);
  });

  document.getElementById('mainContainer').style.opacity = '1';
}

function selectOption(index, el) {
  // Don't allow switching during scare effects
  if (scareLocked) return;

  const q = questions[currentQuestion];

  // Clear previous selection highlighting
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selectedOption = index;

  // Track creepy selections (only count the first time a creepy option is picked on this question)
  if (q.creepy && index === q.creepyOptionIndex && !q._creepyTracked) {
    creepyCount++;
    totalCreepySelected++;
    q._creepyTracked = true;
  }

  document.getElementById('nextBtn').disabled = false;

  // Trigger scare event if applicable (only fire once per question)
  if (q.creepy && q.scareEvent && !q._scareFired) {
    q._scareFired = true;
    triggerScareEvent(q, el, index);
  }
}

async function triggerScareEvent(q, el, index) {
  scareLocked = true;
  try {
  switch (q.scareEvent) {
    case 1: // Option red flash + progress glitch
      triggerOptionRedFlash(el);
      progressGlitch();
      await sleep(900);
      break;
    case 2: // Text shake + false safety
      triggerTextShake();
      setCreepyTitle('心理健康评估中...');
      await sleep(600);
      triggerFalseSafety();
      break;
    case 3: // Dark flash + afterimage
      await triggerDarkFlash(300);
      await sleep(100);
      await triggerAfterimage(500);
      setCreepyTitle('别回头');
      break;
    case 4: // Auto-select + cursor trail
      await sleep(400);
      triggerAutoSelect(el);
      enableCursorTrail();
      setCreepyTitle('我在看着你');
      setTimeout(() => disableCursorTrail(), 8000);
      break;
    case 5: // Impostor detection + glitch text
      triggerGlitchText('我在看着你');
      progressGlitch();
      await sleep(300);
      await triggerImpostorCheck();
      break;
    case 6: // GHOST FACE + activate crawler after
      await triggerGhostFace();
      activateCrawler();
      setCreepyTitle('他来了');
      break;
    case 7: // Barrage scare + all options red
      triggerAllOptionsRed();
      triggerBarrage(4000);
      enableCursorTrail();
      setTimeout(() => disableCursorTrail(), 10000);
      await sleep(4200);
      break;
    case 8: // Screen shake + title change
      triggerScreenShake();
      setCreepyTitle('██████');
      await sleep(300);
      document.getElementById('questionText').classList.add('red');
      setTimeout(() => document.getElementById('questionText').classList.remove('red'), 2000);
      await sleep(2100);
      break;
    case 9: // Final question - no immediate scare, handled in next
      break;
    case 10: // Knocking sound + progress glitch
      switchToHorrorBGM();
      progressGlitch();
      await sleep(600);
      playKnocking();
      await sleep(400);
      playKnocking();
      await sleep(500);
      playKnocking();
      setCreepyTitle('有人在敲门');
      switchToNormalBGM();
      break;
    case 11: // Child's laughter
      await triggerChildLaugh();
      break;
    case 12: // Witch voice
      await triggerWitchVoice();
      break;
    case 13: // Crying woman
      await triggerCryingWoman();
      break;
  }
  } finally {
    scareLocked = false;
  }
}

// ==================== NEXT BUTTON ====================
document.getElementById('nextBtn').addEventListener('click', async () => {
  if (selectedOption < 0) return;

  const q = questions[currentQuestion];

  // Special handling for Q50
  if (q.id === 50) {
    document.getElementById('mainContainer').style.opacity = '0';
    // Dark flash before ending
    const overlay = document.getElementById('darkOverlay');
    overlay.classList.add('flash');
    switchToHorrorBGM();
    await sleep(800);
    // Glitch text
    triggerGlitchText('测试结束');
    await sleep(600);
    overlay.classList.remove('flash');
    showEnding();
    return;
  }

  // Fade out
  document.getElementById('mainContainer').style.opacity = '0';
  await sleep(300);

  // Move to next
  currentQuestion++;
  renderQuestion();

  // BGM management and visual transitions
  if (currentQuestion === 5) {
    // No vignette - user doesn't want it
  }
  if (currentQuestion === 11) {
    // No scanlines - user doesn't want it
  }
  // Progress glitch at key milestones
  if ([15, 25, 35, 45, 50].includes(currentQuestion + 1)) {
    progressGlitch();
    if (currentQuestion + 1 === 25) subtitleImpostor(2500);
    if (currentQuestion + 1 === 35) subtitleImpostor(4000);
    if (currentQuestion + 1 === 50) subtitleImpostor(5000);
  }

  // Fade in
  await sleep(100);
  document.getElementById('mainContainer').style.opacity = '1';
});

// ==================== ENDING ====================
let endingActive = false;
let whisperInterval = null;

function showEnding() {
  // Prevent double-calling
  if (endingActive) return;
  endingActive = true;
  // Hide main container
  document.getElementById('mainContainer').style.display = 'none';

  // Clean up ALL overlays completely
  const darkOverlay = document.getElementById('darkOverlay');
  darkOverlay.classList.remove('flash');
  darkOverlay.style.background = '';
  darkOverlay.style.transition = '';

  const ghostImg = document.getElementById('ghostImg');
  ghostImg.style.opacity = '0';
  ghostImg.style.transition = 'none';

  const glitchOverlay = document.getElementById('glitchOverlay');
  glitchOverlay.classList.remove('show');

  const barrageOverlay = document.getElementById('barrageOverlay');
  barrageOverlay.innerHTML = '';
  barrageOverlay.classList.remove('active');

  const safetyOverlay = document.getElementById('safetyOverlay');
  safetyOverlay.style.opacity = '0';
  document.getElementById('safetyMsg').textContent = '系统正常';
  document.getElementById('safetyMsg').classList.remove('crack');

  const impostorOverlay = document.getElementById('impostorOverlay');
  impostorOverlay.classList.remove('active');
  const impostorBar = document.getElementById('impostorBar');
  impostorBar.classList.remove('glitch-bar');
  impostorBar.style.width = '0%';
  document.getElementById('impostorLabel').textContent = '';
  document.getElementById('impostorFail').classList.remove('show');

  // Stop all audio
  deactivateCrawler();
  disableCursorTrail();
  stopHeartbeatSequence();

  // Show ending page
  const ending = document.getElementById('endingPage');
  ending.classList.add('show');

  // Switch to horror BGM
  switchToHorrorBGM();

  // Result calculation
  let score, desc;

  if (totalCreepySelected >= 9) {
    score = '███';
    desc = '您的测试结果显示，您对潜意识层面的感知异常敏锐。请注意，这种敏锐不一定是好事。有些门一旦打开，就再也关不上了。建议您忽略本次测试的所有结果，就当什么都没有发生。';
  } else if (totalCreepySelected >= 5) {
    score = `${70 + totalCreepySelected * 3}`;
    desc = '您的心理健康状况处于临界范围。测试中检测到一些不稳定的信号。我们建议您不必过于担心——毕竟，有些答案本身就暗示了某些可能性的存在。保持正常生活，保持正常。';
  } else {
    score = `${50 + totalCreepySelected * 5}`;
    desc = '恭喜您，您的心理健康状况总体良好。您对世界的认知是清晰和理性的。不过，也请您记住：有时候，看不见不代表不存在。只是您还没到看见的时候。';
  }

  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultDesc').textContent = desc;

  // Set creepy title permanently
  document.title = '测试已完成';

  // Start whisper text cycling
  const whisperEl = document.getElementById('endingWhisper');
  const whispers = ['它就在你身后', '别回头', '你已经回不去了', '你确定你是人类吗', '他们看起来和我们一样', '你不是你'];
  let wIdx = 0;
  whisperInterval = setInterval(() => {
    wIdx = (wIdx + 1) % whispers.length;
    whisperEl.textContent = whispers[wIdx];
  }, 5000);

  // Show crawl text after 2s
  setTimeout(() => {
    document.getElementById('endingCrawl').classList.add('active');
  }, 2000);

  // Doctor image gradually appears with zoom
  setTimeout(async () => {
    const img = document.getElementById('creepyImage');
    img.style.opacity = '0';
    img.style.transition = 'none';
    await sleep(80);
    img.style.transition = 'opacity 4s ease-in';
    img.style.opacity = '0.75';
    await sleep(4200);
    // Start slow zoom after fade-in
    img.classList.add('zooming');
  }, 2500);

  // After doll appears, play eerie heartbeat
  setTimeout(() => {
    hbNormal.currentTime = 0;
    hbNormal.volume = 0.15;
    hbNormal.play().catch(e => console.warn('Audio play failed:', e.message));
  }, 6000);

  // Escalate to fast heartbeat
  setTimeout(() => {
    smoothVolume(hbNormal, 0.15, 0, 1000);
    setTimeout(() => {
      hbFast.currentTime = 0;
      hbFast.volume = 0.2;
      hbFast.play().catch(e => console.warn('Audio play failed:', e.message));
    }, 1100);
  }, 10000);

  // Restart button handler
  document.getElementById('restartBtn').addEventListener('click', resetGame);
}

// ==================== RESET GAME ====================
function resetGame() {
  // Reset game state
  currentQuestion = 0;
  selectedOption = -1;
  creepyCount = 0;
  totalCreepySelected = 0;
  scareLocked = false;
  endingActive = false;

  // Clear whisper interval
  if (whisperInterval) { clearInterval(whisperInterval); whisperInterval = null; }

  // Reset all questions' internal state
  questions.forEach(q => {
    q._creepyTracked = false;
    q._scareFired = false;
  });

  // Hide ending page
  const ending = document.getElementById('endingPage');
  ending.classList.remove('show');
  document.getElementById('creepyImage').style.opacity = '0';
  document.getElementById('creepyImage').classList.remove('zooming');

  // Clean overlays
  document.getElementById('endingCrawl').classList.remove('active');
  document.getElementById('darkOverlay').classList.remove('flash');
  document.getElementById('darkOverlay').style.background = '';
  document.getElementById('darkOverlay').style.transition = '';
  document.getElementById('ghostImg').style.opacity = '0';
  document.getElementById('glitchOverlay').classList.remove('show');
  document.getElementById('barrageOverlay').innerHTML = '';
  document.getElementById('barrageOverlay').classList.remove('active');
  document.getElementById('safetyOverlay').style.opacity = '0';
  document.getElementById('safetyMsg').classList.remove('crack');
  document.getElementById('impostorOverlay').classList.remove('active');
  document.getElementById('impostorBar').classList.remove('glitch-bar');
  document.getElementById('impostorBar').style.width = '0%';
  document.getElementById('impostorFail').classList.remove('show');

  // Stop all audio and reset
  stopHeartbeatSequence();
  switchToNormalBGM();
  bgmAudio.currentTime = 0;
  document.title = originalTitle;

  // Hide body effects
  document.body.classList.remove('screen-shake', 'afterimage', 'cursed-cursor');
  cursorTrailActive = false;

  // Show main container
  document.getElementById('mainContainer').style.display = '';
  document.getElementById('mainContainer').style.opacity = '1';

  // Render first question
  renderQuestion();
}

// ==================== INITIALIZE ====================
function init() {
  renderQuestion();
  // Start audio on first user interaction
  document.addEventListener('click', () => {
    initAudio();
    bgmAudio.play().catch(e => console.warn('BGM play failed:', e.message));
    switchToNormalBGM();
  }, { once: true });
}

init();
